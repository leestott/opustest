# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: code-verification
metadata:
  template: code-verification
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  postprovision:
    windows:
      shell: pwsh
      run: scripts/postprovision.ps1
    posix:
      shell: sh
      run: scripts/postprovision.sh
services:
  web:
    project: .
    language: py
    host: containerapp
    docker:
      path: Dockerfile
